version: 2
updates:
  # Gradle dependencies
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "gradle"
    commit-message:
      prefix: "chore"
      include: "scope"
    # AGP, Kotlin, KSP, and the Gradle wrapper are mutually pinned to a
    # verified-compatible set (see CLAUDE.md "Key dependencies"). Bumping any
    # one alone — without the others — has broken the build twice already
    # (see commits 94ff606 and 2968f77). Require a manual, coordinated bump
    # for these instead of letting them drift apart one PR at a time.
    ignore:
      - dependency-name: "com.android.application"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "org.jetbrains.kotlin.android"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "org.jetbrains.kotlin.plugin.compose"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "com.google.devtools.ksp"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "gradle"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
