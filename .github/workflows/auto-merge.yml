name: Auto Merge

# Merges a PR into main only after the CI workflow (lint + test + build-debug)
# has completed successfully for the PR's current head commit.
#
# Why workflow_run instead of pull_request: this repo has no branch protection
# rules requiring status checks, so enabling auto-merge at PR-open time merges
# the PR immediately — before CI has run. That is how broken dependency bumps
# previously landed on main. Gating on the finished CI run closes that hole:
# a PR is only merged for a commit whose CI is green.
#
# Note: merges pushed with GITHUB_TOKEN do not trigger workflows on main
# (GitHub recursion guard), so auto-release.yml must be run manually via
# workflow_dispatch when a release is wanted.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-green-prs:
    name: Merge PRs with green CI
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Merge open PRs whose head commit passed CI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          gh pr list --repo "$GITHUB_REPOSITORY" --state open --base main \
            --json number,isDraft,headRefOid \
            --jq ".[] | select(.isDraft | not) | select(.headRefOid == \"$HEAD_SHA\") | .number" |
          while read -r pr; do
            echo "CI is green for PR #$pr ($HEAD_SHA) — merging (squash)"
            gh pr merge --squash --auto "$pr" --repo "$GITHUB_REPOSITORY" \
              || gh pr merge --squash "$pr" --repo "$GITHUB_REPOSITORY" \
              || echo "Could not merge PR #$pr (conflict or new push) — skipping"
          done
