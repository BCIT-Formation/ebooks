name: Release

# Triggered on every push to main (after auto-merge) or manually via workflow_dispatch.
#
# Auto (push to main):
#   - Bumps semver from conventional commits
#   - Builds + publishes release APK
#
# Manual (workflow_dispatch):
#   - Either auto-detect version from commits, or use explicit version input
#   - Supports dry-run mode (tag and build but don't publish)
#
# Commit prefix → version bump:
#   feat!: / BREAKING CHANGE  →  major
#   feat:                     →  minor
#   fix: / perf: / refactor:  →  patch
#   chore: / docs: / ci:      →  patch (tagged but low-impact)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.2.3, or leave empty to auto-detect)'
        required: false
        type: string
      dry_run:
        description: 'Dry run — tag and build but do NOT publish release'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  release:
    name: Tag → Build APK → Publish Release
    runs-on: ubuntu-latest

    env:
      SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      EXPLICIT_VERSION: ${{ github.event.inputs.version_name }}

    steps:
      # ── 1. Checkout full history (tag action needs all commits) ───────────────
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # ── 2. Bump semver from conventional commits, create tag ─────────────────
      # (skip if explicit version was provided via manual dispatch)
      - name: Bump version & create tag (auto-detect)
        if: env.EXPLICIT_VERSION == ''
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: 'v'
          default_bump: patch
          custom_release_rules: |
            chore:patch:Chores
            docs:patch:Documentation
            style:patch:Styles
            ci:patch:CI

      # Use explicit version if provided, otherwise use auto-detected tag
      - name: Set version (explicit or auto-detected)
        id: version
        run: |
          if [[ -n "$EXPLICIT_VERSION" ]]; then
            VERSION="v$EXPLICIT_VERSION"
          else
            VERSION="${{ steps.tag.outputs.new_tag }}"
          fi

          if [[ -z "$VERSION" ]]; then
            echo "No releasable commits since last tag — nothing to release."
            echo "new_tag=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "new_tag=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Skip if no releasable commits
        if: steps.version.outputs.new_tag == ''
        run: |
          echo "No version determined — skipping release."
          exit 0

      # ── 3. Build environment ──────────────────────────────────────────────────
      - uses: actions/setup-java@v5
        if: steps.version.outputs.new_tag != ''
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v4
        if: steps.version.outputs.new_tag != ''

      # ── 4. Decode keystore (optional — unsigned build if secret not set) ──────
      - name: Decode keystore
        if: steps.version.outputs.new_tag != '' && env.SIGNING_KEYSTORE_BASE64 != ''
        run: echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > keystore.jks

      # ── 5. Build signed release APK ───────────────────────────────────────────
      - name: Build & sign release APK
        if: steps.version.outputs.new_tag != '' && env.SIGNING_KEYSTORE_BASE64 != ''
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: ${{ steps.version.outputs.new_tag }}
        run: |
          ./gradlew assembleRelease --no-daemon --build-cache \
            -PVERSION_CODE="${VERSION_CODE}" \
            -PVERSION_NAME="${VERSION_NAME}" \
            -Pandroid.injected.signing.store.file="${GITHUB_WORKSPACE}/keystore.jks" \
            -Pandroid.injected.signing.store.password="${{ secrets.SIGNING_STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.SIGNING_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.SIGNING_KEY_PASSWORD }}" || { echo "❌ Gradle build failed"; exit 1; }

      # ── 5b. Fallback when no keystore secrets: the build type falls back to
      #        the debug signing config (see app/build.gradle.kts), so the APK
      #        is still signed and installable — just not with a release key.
      - name: Build release APK (debug-signed fallback)
        if: steps.version.outputs.new_tag != '' && env.SIGNING_KEYSTORE_BASE64 == ''
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: ${{ steps.version.outputs.new_tag }}
        run: |
          ./gradlew assembleRelease --no-daemon --build-cache \
            -PVERSION_CODE="${VERSION_CODE}" \
            -PVERSION_NAME="${VERSION_NAME}" || { echo "❌ Gradle build failed"; exit 1; }

      # ── 5c. Verify APK was built ──────────────────────────────────────────────
      - name: Verify APK was built
        if: steps.version.outputs.new_tag != ''
        run: |
          APK_COUNT=$(find app/build/outputs/apk/release -name "*.apk" -type f 2>/dev/null | wc -l)
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "❌ ERROR: No APK found in app/build/outputs/apk/release/"
            echo "Build likely failed. Check Gradle output above."
            ls -lah app/build/outputs/apk/release/ || echo "Directory does not exist!"
            exit 1
          fi
          echo "✅ Found $APK_COUNT APK(s)"
          echo "apk_found=true" >> $GITHUB_ENV

      # ── 6. Rename APK with version ────────────────────────────────────────────
      - name: Stage APK
        if: steps.version.outputs.new_tag != '' && env.apk_found == 'true'
        run: |
          VER="${{ steps.version.outputs.new_tag }}"
          VER="${VER#v}"
          mkdir -p release
          echo "📁 Looking for APK in app/build/outputs/apk/release/"
          ls -lah app/build/outputs/apk/release/ || echo "Directory does not exist!"
          find app/build/outputs/apk/release -name "*.apk" \
            -exec cp {} "release/EbookReader-${VER}.apk" \;
          if [ ! -f "release/EbookReader-${VER}.apk" ]; then
            echo "❌ ERROR: APK staging failed"
            exit 1
          fi
          echo "✅ APK staged successfully"
          ls -lh release/

      # ── 7. Upload as workflow artifact (accessible even on dry-run) ───────────
      - name: Upload APK artifact
        if: steps.version.outputs.new_tag != '' && env.apk_found == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: EbookReader-${{ steps.version.outputs.new_tag }}
          path: release/*.apk
          retention-days: 90

      # ── 8. Create GitHub Release with APK attached (unless dry-run) ───────────
      - name: Create GitHub Release
        if: steps.version.outputs.new_tag != '' && env.apk_found == 'true' && env.DRY_RUN != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.new_tag }}
          name: EbookReader ${{ steps.version.outputs.new_tag }}
          body: |
            ## EbookReader ${{ steps.version.outputs.new_tag }}

            Install on any Android device running **API 26 (Android 8.0)+**.

            > Enable **Install from unknown sources** in Android Settings if prompted.

            ### What's changed
            ${{ steps.tag.outputs.changelog || '*(auto-detected version - no changelog)' }}
          files: release/*.apk
          fail_on_unmatched_files: true
