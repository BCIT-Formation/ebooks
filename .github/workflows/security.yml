name: Security Audit

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v4

      - name: Generate dependency report
        run: ./gradlew :app:dependencies > dependency-report.txt

      - name: Upload dependency report
        uses: actions/upload-artifact@v7
        with:
          name: dependency-report
          path: dependency-report.txt
          retention-days: 30

  secret-scan:
    name: Secret Scanning
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # No base/head: scan the full git history. Diff mode (base == default
      # branch) errors out when BASE and HEAD resolve to the same commit,
      # which is exactly what happens on pushes to main and scheduled runs.
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified
