name: PR Check

on:
  pull_request:
    branches: [main, develop]

jobs:
  validate-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title follows Conventional Commits
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            test
            chore
            ci
            build
            perf

  # Lint, unit tests, and the debug build already run in ci.yml on this same
  # PR event — re-running them here would just double CI time for no extra
  # coverage. This job only checks what ci.yml doesn't: no secrets committed.
  # Keep the job id/name stable — branch protection required-checks rules
  # reference it by name.
  required-checks:
    name: Required Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check no secrets in code
        run: |
          ! grep -rn --include="*.kt" --include="*.xml" \
            -E "(password|secret|api_key|token)\s*=\s*['\"][^'\"]{8,}['\"]" \
            app/src/ || (echo "Potential secret found in code!" && exit 1)
