name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Unified workflow: PR title validation + four parallel quality checks.
# Keep job ids/names (lint / test / build-debug / required-checks) stable —
# auto-merge.yml and branch protection rules reference these.
jobs:
  validate-title:
    name: Validate PR Title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title follows Conventional Commits
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            test
            chore
            ci
            build
            perf

  required-checks:
    name: Required Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check no secrets in code
        run: |
          ! grep -rn --include="*.kt" --include="*.xml" \
            -E "(password|secret|api_key|token)\s*=\s*['\"][^'\"]{8,}['\"]" \
            app/src/ || (echo "Potential secret found in code!" && exit 1)

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v4

      # Advisory only (abortOnError = false in app/build.gradle.kts):
      # reports are uploaded but lint findings do not fail the build.
      - name: Lint
        run: ./gradlew lint --no-daemon --build-cache

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report
          path: app/build/reports/lint-results*.html
          retention-days: 14

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v4

      - name: Unit tests
        run: ./gradlew test --no-daemon --build-cache

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: app/build/reports/tests/
          retention-days: 14

  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v4

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --no-daemon --build-cache

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
