name: CI

on:
  push:
    branches: [master, main, develop, 'claude/**']
  pull_request:
    branches: [master, main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Three parallel jobs sharing one simple setup: checkout → JDK 17 (with the
# built-in Gradle cache) → Android SDK → gradlew. Keep the job ids/names
# (lint / test / build-debug) stable — auto-merge.yml and any branch
# protection rules reference this workflow's checks.
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v4

      # Advisory only (abortOnError = false in app/build.gradle.kts):
      # reports are uploaded but lint findings do not fail the build.
      - name: Lint
        run: ./gradlew lint --no-daemon --build-cache

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report
          path: app/build/reports/lint-results*.html
          retention-days: 14

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v4

      - name: Unit tests
        run: ./gradlew test --no-daemon --build-cache

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: app/build/reports/tests/
          retention-days: 14

  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v4

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --no-daemon --build-cache

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
